apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-redis
  template:
    metadata:
      labels:
        app: user-redis
    spec:
      containers:
        - name: user-service-redis
          image: redis:7-alpine
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"      # 1/4 ядра процессора
            limits:
              memory: "512Mi"  # Не даем приложению съесть больше 1ГБ
              cpu: "500m"
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
          command: [ "redis-server", "--appendonly", "yes" ]
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: user-redis-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: user-redis
spec:
  selector:
    app: user-redis
  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-redis-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi